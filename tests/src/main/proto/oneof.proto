syntax = "proto2";
package io.github.merlimat.lightproto.tests;

option java_outer_classname = "OneofProtos";

message SubMessage {
    optional int32 value = 1;
    optional string label = 2;
}

message OneofMsg {
    optional string name = 1;

    oneof test_oneof {
        int32 oneof_int = 10;
        string oneof_string = 11;
        bool oneof_bool = 12;
        SubMessage oneof_msg = 13;
    }

    oneof second_oneof {
        double oneof_double = 20;
        bytes oneof_bytes = 21;
    }

    optional int32 after_field = 30;
}
